name: AWS Staging Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: string
      component:
        description: Target component (optional, informational)
        required: false
        type: string
      action:
        description: Action name (optional)
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385074783484:role/leninkart-terraform-github-oidc-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=envs/${{ inputs.environment }} init

      - name: Terraform Destroy
        run: terraform -chdir=envs/${{ inputs.environment }} destroy -auto-approve -input=false