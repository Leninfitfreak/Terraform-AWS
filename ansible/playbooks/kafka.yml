---
- name: Configure Kafka EC2 (staging)
  hosts: kafka
  become: true
  vars:
    kafka_version: "3.7.0"
    scala_version: "2.13"
    kafka_install_dir: "/opt/kafka"
    kafka_data_dir: "/var/lib/kafka"
    kafka_log_dir: "/var/log/kafka"
    kafka_listeners: "PLAINTEXT://0.0.0.0:9092"
    # Prefer private endpoint; must be set from Terraform output
    kafka_advertised_listeners: "PLAINTEXT://{{ kafka_advertised_host }}:9092"
    kafka_node_id: 1
    kafka_cluster_id: "7W9Qh1P0T9u8i6X4k2M3N5"
    kafka_heap_opts: "-Xms256M -Xmx256M"
    kafka_jvm_opts: "-XX:+UseG1GC"
    kafka_service_user: "kafka"
    kafka_service_group: "kafka"
  roles:
    - kafka
